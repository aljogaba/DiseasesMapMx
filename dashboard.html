<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | DiseasesMapMx</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>

<body>

<header>
    <nav>
        <h1>DiseasesMapMx</h1>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="prrsv.html">PRRSV</a></li>
            <li><a href="pcv2.html">PCV2</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="dashboard-container">

    <div class="stats-grid">

        <div class="stat-card">
            <h3>Total Sequences</h3>
            <p id="totalSequences">0</p>
        </div>

        <div class="stat-card">
            <h3>Municipalities</h3>
            <p id="totalMunicipalities">0</p>
        </div>

        <div class="stat-card">
            <h3>Most Common Lineage</h3>
            <p id="topLineage">-</p>
        </div>

    </div>

    <div class="dashboard-grid">

        <div class="map-panel">
            <h2>Geographic Surveillance</h2>
            <div id="map"></div>
        </div>

        <div class="chart-panel">
            <h2>Sequences by Lineage</h2>
            <div id="lineageChart"></div>
        </div>

        <div class="chart-panel">
            <h2>Sequences by Year</h2>
            <div id="yearChart"></div>
        </div>

        <div class="chart-panel">
            <h2>Sequences by Production Stage</h2>
            <div id="stageChart"></div>
        </div>

    </div>

</section>

</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<!-- Custom JS -->
<script src="assets/js/script.js"></script>

</body>
</html>
